name: Build Backend

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Environment (qa/production)"
      run_tests:
        required: false
        type: boolean
        description: "Run tests after build"
        default: false
      run_publish:
        required: false
        type: boolean
        description: "Publish after build"
        default: false
      update_build_number:
        required: false
        type: boolean
        description: "Update build number"
        default: false
      update_version_from_tag:
        required: false
        type: boolean
        description: "Update version based on latest tag"
        default: false

jobs:
  build:
    name: Build .NET
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: CSharpier
        run: |
          dotnet tool restore
          dotnet csharpier --version
          dotnet csharpier check .

      - name: Update Build Number
        if: inputs.update_build_number == true
        run: |
          FILE="Directory.Build.props"

          # Extract current version number
          CURRENT_VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" $FILE)

          # Split into parts (major.minor.patch.build)
          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$CURRENT_VERSION"

          # Change patch
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}.${{ github.run_number}}"

          echo "New version: $NEW_VERSION"

          # Replace in file
          sed -i "s#<Version>.*</Version>#<Version>${NEW_VERSION}</Version>#g" $FILE

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update Version
        if: inputs.update_version_from_tag == true
        run: |
          # Get the full tag ref, for example refs/tags/production/1.2.3
          TAG_REF="${{ github.ref }}"
          echo "Tag ref: $TAG_REF"

          # Extract the version (part after the last slash)
          VERSION="${TAG_REF##*/}"
          echo "Version: $VERSION"

          # Update Directory.Build.props
          FILE="Directory.Build.props"
          sed -i "s#<Version>.*</Version>#<Version>${VERSION}</Version>#g" "$FILE"

          # Set output for next steps
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore --configuration Release /p:OpenApiGenerateDocuments=false

      - name: Run unit tests
        if: inputs.run_tests == true
        run: dotnet test ChessTournaments.slnx --configuration Release --no-restore --filter FullyQualifiedName~UnitTests

      # - name: Validate OpenAPI Definition
      #   run: |
      #     npm install -g @stoplight/spectral-cli
      #     spectral lint src/ChessTournaments.API/ChessTournaments.API.json \
      #       --fail-severity error

      - name: Upload OpenAPI Definition
        uses: actions/upload-artifact@v4
        with:
          name: openapi-definition-${{ github.run_number }}
          path: "backend/src/ChessTournaments.API/ChessTournaments.API.json"
          retention-days: 1

      - name: Publish
        if: inputs.run_publish == true
        run: |
          dotnet publish src/ChessTournaments.API/ChessTournaments.API.csproj \
            --output publish \
            --configuration Release \
            /p:OpenApiGenerateDocuments=false

        # -r linux-x64 \
        # --self-contained true

      - name: Upload Artifacts
        if: inputs.run_publish == true
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-${{ github.run_number }}
          path: "./backend/publish"
          retention-days: 1
